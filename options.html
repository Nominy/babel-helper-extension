<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Babel Helper Settings</title>
    <style>
      :root {
        --bg: #f4f5f8;
        --surface: #ffffff;
        --surface-border: #dde2ea;
        --ink: #172034;
        --muted: #5f6f86;
        --accent: #0f7a67;
        --accent-soft: #e6f3f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, #d9f0ff 0%, transparent 42%),
          radial-gradient(circle at bottom left, #ffeecd 0%, transparent 48%),
          var(--bg);
      }

      .page {
        max-width: 840px;
        margin: 0 auto;
        padding: 28px 20px 24px;
      }

      .hero {
        margin-bottom: 18px;
      }

      .title {
        margin: 0;
        font-size: 30px;
        line-height: 1.15;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(15, 30, 55, 0.06);
      }

      .feature-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .feature-card {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: start;
        gap: 12px;
        padding: 13px;
        border: 1px solid #dce3ed;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        cursor: pointer;
      }

      .feature-card:hover {
        border-color: #bbc8db;
      }

      .feature-toggle {
        width: 18px;
        height: 18px;
        margin-top: 3px;
        accent-color: var(--accent);
      }

      .feature-title {
        font-size: 15px;
        font-weight: 700;
      }

      .feature-description {
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
      }

      .footer {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .status {
        font-size: 13px;
        color: #25455f;
        background: var(--accent-soft);
        border: 1px solid #c2e4dc;
        border-radius: 999px;
        padding: 7px 12px;
      }

      .reset-btn {
        appearance: none;
        border: 1px solid #cfd8e6;
        background: #fff;
        color: var(--ink);
        font-weight: 600;
        font-size: 13px;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .reset-btn:hover {
        background: #f3f7fc;
      }

      @media (max-width: 560px) {
        .page {
          padding: 20px 14px 18px;
        }

        .title {
          font-size: 25px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1 class="title">Babel Helper Settings</h1>
        <p class="subtitle">Enable only the features your team needs. Changes are saved automatically.</p>
      </section>

      <section class="panel">
        <div class="feature-list" data-role="feature-list"></div>
        <div class="footer">
          <button class="reset-btn" type="button" data-role="reset">Reset to Defaults</button>
          <div class="status" data-role="status">Loading...</div>
        </div>
      </section>
    </main>
    <script src="dist/options/options.js"></script>
  </body>
</html>
